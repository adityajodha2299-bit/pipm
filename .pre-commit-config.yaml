repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-added-large-files
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: block-env
        name: Block .env files
        entry: bash -c 'if git diff --cached --name-only | grep -E "\.env"; then echo "❌ .env not allowed"; exit 1; fi'
        language: system